<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matkalla Suomessa – v30 Karavaanari</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="heroOverlay">
        <h1>Matkalla<br>Suomessa ♡</h1>
        <p>Kaikki Suomen matkasi yhdessä paikassa</p>
      </div>
    </section>

    <section class="searchBox">🔍 Hae kuntaa, paikkaa tai nähtävyyttä...</section>

    <section class="topCards">
      <button class="card primary">
        <span class="icon">＋</span>
        <strong>Uusi matka</strong>
        <small>Tallenna uusi matka hetkessä</small>
      </button>
      <button class="card">
        <span class="icon">🗺️</span>
        <strong>Avaa kartta</strong>
        <small>Tutki paikkoja ja merkitse käydyksi</small>
      </button>
    </section>

    <section class="progressCard">
      <div>
        <h2>Suomen valloitus</h2>
      </div>
      <div class="circle">0%</div>
      <div class="stats">
        <div><b>0</b><span>Käytyä</span></div>
        <div><b>308</b><span>Kuntaa</span></div>
        <div><b>19</b><span>Maakuntaa</span></div>
      </div>
    </section>

    <h2 class="sectionTitle">Lisää tietoja matkaasi</h2>

    <section class="infoGrid">
      <button>📷<span>Kuvat</span></button>
      <button>🍴<span>Ravintola</span></button>
      <button>☕<span>Kahvila</span></button>
      <button>🛏️<span>Yöpyminen</span></button>
      <button>🏕️<span>Leirintäalue</span></button>
      <button>✨<span>Nähtävyys</span></button>
      <button class="caravan" onclick="document.querySelector('#karavaanari').scrollIntoView({behavior:'smooth'})">🚐<span>Karavaanari</span></button>
    </section>

    <section id="karavaanari" class="caravanSection">
      <div class="caravanHeader">
        <span>🚐</span>
        <div>
          <h2>Karavaanari</h2>
          <p>Tärkeimmät palvelut matkailuauto- ja vaunumatkailuun.</p>
        </div>
      </div>

      <div class="caravanGrid">
        <button class="bigItem">🏕️<strong>Leirintäalueet</strong><small>Etsi leirintäalueet kartalta ja listalta.</small></button>
        <button class="bigItem">🅿️<strong>Matkaparkit</strong><small>Löydä matkailuautoille sopivat matkaparkit.</small></button>
        <button class="smallItem">🚰<strong>Huoltopisteet</strong></button>
        <button class="smallItem">⚡<strong>Sähkö</strong></button>
        <button class="smallItem">🍴<strong>Ruokailu</strong></button>
        <button class="smallItem">🛒<strong>Kaupat</strong></button>
      </div>
    </section>

    <nav class="bottomNav">
      <a>🏠<span>Etusivu</span></a>
      <a>🗺️<span>Kartta</span></a>
      <button>＋</button>
      <a>📖<span>Päiväkirja</span></a>
      <a>👤<span>Minä</span></a>
    </nav>
  </main>
</body>
</html>
