<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matkalla Suomessa</title>
  <link rel="stylesheet" href="tyylit.css" />
</head>
<body>
  <div class="app">
    <header class="hero real-hero">
      <div class="hero-photo"></div>
      <div class="toprow floating">
        <button class="round glass">☰</button>
        <div class="top-actions">
          <button class="round glass bell">🔔</button>
          <button class="round glass">♡</button>
        </div>
      </div>
      <div class="brand-hero">
        <div class="script">Matkalla</div>
        <div class="wide">SUOMESSA</div>
        <p>Koe. Tutustu. Muista.</p>
      </div>
      <button class="search hero-search" onclick="showSearch()">🔍 Hae kuntaa, paikkaa tai nähtävyyttä...</button>
    </header>

    <main class="content home-content v37">
      <section class="quick-grid lifted">
        <button class="quick-card map" onclick="go('map')">
          <span class="icon fin">🇫🇮</span>
          <b>Avaa kartta</b>
          <small>Tutustu Suomeen maakunta kerrallaan</small>
          <em>›</em>
        </button>
        <button class="quick-card add" onclick="go('newTrip')">
          <span class="icon plus">＋</span>
          <b>Lisää matka</b>
          <small>Tallenna uusi kohde ja muistot</small>
          <em>›</em>
        </button>
      </section>

      <section class="section-title first"><h2>Jatka matkaa</h2><button>Näytä kaikki ›</button></section>
      <article class="continue-card premium">
        <div class="continue-img fire"></div>
        <div class="continue-body">
          <small>Viimeisin matka</small>
          <h3>Päijät-Häme</h3>
          <p>Asikkala – Vääksy – Pulkkilanharju</p>
          <div class="bar"><span style="width:63%"></span></div>
          <div class="row"><span>Käyty kunnista 5 / 8</span><b>63%</b></div>
        </div>
      </article>

      <section class="section-title"><h2>Suosikit</h2><button>Näytä kaikki ›</button></section>
      <div class="favorite-row premium-row">
        <article class="fav castle"><button>♥</button><b>Häme</b><span>5 kohdetta</span></article>
        <article class="fav coast"><button>♥</button><b>Varsinais-Suomi</b><span>3 kohdetta</span></article>
        <article class="fav lake"><button>♥</button><b>Päijänne</b><span>2 kohdetta</span></article>
        <article class="fav north"><button>♥</button><b>Lappi</b><span>1 kohde</span></article>
      </div>

      <section class="section-title"><h2>Lisää tietoja matkaasi</h2><button>Näytä lisää ˅</button></section>
      <div class="tool-grid premium-tools">
        <button>📷<span>Kuvat</span></button>
        <button>📍<span>Sijainti</span></button>
        <button>📝<span>Muistiinpano</span></button>
        <button>⭐<span>Arvio</span></button>
      </div>

      <section class="section-title"><h2>Lähellä sinua</h2><button>Kartalla ›</button></section>
      <div class="near-list premium-near">
        <button><span class="near-thumb pulkki"></span><span><b>Pulkkilanharju</b><small>Luontokohde · 6 km · ★ 4,8</small></span><em>Avaa</em></button>
        <button><span class="near-thumb cafe"></span><span><b>Kahvila Kanavan Helmi</b><small>Tauko ja herkkuhetki · 2 km · ★ 4,6</small></span><em>Avaa</em></button>
        <button><span class="near-thumb camp"></span><span><b>Leirintäalue</b><small>Yöpyminen · 11 km · ★ 4,5</small></span><em>Avaa</em></button>
      </div>

      <section class="section-title"><h2>Vinkit matkalle</h2><button>Näytä kaikki ›</button></section>
      <div class="tip-grid">
        <button><span>🚐</span><b>Leirintäalueet</b><small>Yöpymiseen</small></button>
        <button><span>🅿️</span><b>Pysäköinti</b><small>Helppo pysähdys</small></button>
        <button><span>🚰</span><b>Huoltopisteet</b><small>Matkan varrelle</small></button>
        <button><span>🍴</span><b>Ravintolat</b><small>Paikalliset herkut</small></button>
      </div>
      <div class="bottom-space"></div>
    </main>

    <nav class="bottomnav">
      <button class="active" onclick="go('home')">🏠<span>Etusivu</span></button>
      <button onclick="go('map')">🗺️<span>Kartta</span></button>
      <button class="center" onclick="go('newTrip')">＋</button>
      <button onclick="go('diary')">📖<span>Päiväkirja</span></button>
      <button onclick="go('profile')">👤<span>Minä</span></button>
    </nav>
  </div>
  <script src="data.js"></script><script src="sovellus.js"></script>
</body>
</html>
