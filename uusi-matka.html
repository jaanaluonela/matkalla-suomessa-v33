<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Uusi matka</title><link rel="stylesheet" href="tyylit.css"></head><body><div class="phone-shell form-page">
<header class="page-head"><a class="circle" href="paivakirja.html">‹</a><h1>＋ Uusi matka</h1></header>
<main class="content form-content">
  <section class="cover-upload"><span>📷</span><b>Lisää kansikuva</b><small>Ota kuva tai valitse puhelimesta</small></section>
  <label>Matkan nimi<input placeholder="Esim. Kesäretki Päijät-Hämeeseen"></label>
  <div class="form-two"><label>Alkaa<input type="date"></label><label>Päättyy<input type="date"></label></div>
  <div class="form-two"><label>Maakunta<select><option>Päijät-Häme</option><option>Lappi</option><option>Varsinais-Suomi</option></select></label><label>Kunta<input placeholder="Asikkala"></label></div>
  <details class="more-box"><summary>Lisää tietoja</summary><label>Matkatyyppi<select><option>Karavaanimatka</option><option>Päiväretki</option><option>Viikonloppu</option><option>Lomamatka</option></select></label><label>Seurue<input placeholder="Esim. 2 aikuista + Otto"></label><label class="toggle-line"><span>Merkitse suosikiksi</span><input type="checkbox"></label></details>
  <section class="add-section"><h2>📸 Kuvat</h2><button>＋ Lisää kuvia</button><p>Ei vielä kuvia. Kuvat tallentuvat tämän matkan alle.</p></section>
  <section class="add-section"><h2>📝 Muistiinpanot</h2><button>＋ Lisää muistiinpano</button></section>
  <section class="add-section grid-actions"><a>📍 Kohde</a><a>🍽 Ravintola</a><a>☕ Kahvila</a><a>🏕 Yöpyminen</a></section>
  <button class="save-btn">Tallenna matka</button>
</main>
